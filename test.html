<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold text-gray-900 mb-8">Expense Tracker & Analytics</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">Dashboard</h2>
                <p class="text-gray-600">View your spending overview</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">Expenses</h2>
                <p class="text-gray-600">Manage your expenses</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">Analytics</h2>
                <p class="text-gray-600">View detailed insights</p>
            </div>
        </div>
        
        <div class="bg-green-50 p-6 rounded-lg mb-8">
            <h3 class="text-lg font-semibold text-green-800 mb-2">✅ Project Status</h3>
            <p class="text-green-700">Backend server is running on port 5000</p>
            <p class="text-green-700">API endpoints are working correctly</p>
            <p class="text-green-700">MongoDB connection established</p>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow">
            <h3 class="text-lg font-semibold mb-4">API Test</h3>
            <button onclick="testAPI()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Test API Connection
            </button>
            <div id="api-result" class="mt-4 p-4 bg-gray-100 rounded"></div>
        </div>
    </div>
    
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('api-result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('http://localhost:5000/api/expenses');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h4 class="font-semibold text-green-700">✅ API Connected Successfully!</h4>
                    <pre class="mt-2 text-sm">${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <h4 class="font-semibold text-red-700">❌ API Connection Failed</h4>
                    <p class="mt-2">${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
