<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Error - Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glossy-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            position: relative;
            overflow: hidden;
        }
        
        .glossy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .glossy-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .glossy-button {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .glossy-button:hover {
            background: linear-gradient(145deg, #334155, #1e293b);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .glossy-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .glossy-button:hover::before {
            left: 100%;
        }
        
        .glossy-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            box-shadow: 
                0 10px 20px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100vw;
            min-width: 100%;
            height: 100px;
            min-height: 100px;
            position: relative;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .animate-shimmer {
            animation: shimmer 2s infinite;
        }
        
        .delay-1000 {
            animation-delay: 1s;
        }
    </style>
</head>
<body class="glossy-bg min-h-screen">
    <!-- Header -->
    <header class="glossy-header shadow-lg border-b border-white/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-240 py-8">
                <div class="flex items-center">
                    <h1 class="text-3xl font-bold text-white flex items-center">
                        <span class="mr-3">💰</span> EXPENSE TRACKER
                    </h1>
                </div>
                <nav class="flex space-x-8">
                    <a href="index.html" class="nav-btn glossy-nav-btn text-white/90 hover:text-white px-4 py-2 text-sm font-medium rounded-lg">Dashboard</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="min-h-screen flex items-center justify-center">
        <div class="relative z-10">
            <!-- Animated Background Elements -->
            <div class="absolute inset-0 overflow-hidden">
                <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-500/20 rounded-full blur-3xl animate-pulse"></div>
                <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-blue-500/20 rounded-full blur-3xl animate-pulse delay-1000"></div>
            </div>
            
            <!-- Error Container -->
            <div class="glossy-card rounded-2xl p-8 max-w-md w-full mx-4 relative overflow-hidden">
                <!-- Shimmer Effect -->
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -skew-x-12 animate-shimmer"></div>
                
                <div class="text-center relative z-10">
                    <!-- Error Icon with Animation -->
                    <div class="mx-auto w-20 h-20 bg-gradient-to-br from-red-500 to-red-600 rounded-full flex items-center justify-center mb-6 shadow-2xl transform transition-all duration-300 hover:scale-110">
                        <svg class="w-10 h-10 text-white animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </div>
                    
                    <!-- Error Title -->
                    <h1 class="text-3xl font-bold text-white mb-3 bg-gradient-to-r from-red-400 to-red-600 bg-clip-text text-transparent">
                        Authentication Failed
                    </h1>
                    
                    <!-- Error Description -->
                    <p class="text-gray-300 mb-6 leading-relaxed">
                        We couldn't complete your login with <span id="provider-name" class="font-semibold text-white"></span>
                    </p>
                    
                    <!-- Error Details Card -->
                    <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-6 mb-6 backdrop-blur-sm">
                        <div class="flex items-center mb-2">
                            <svg class="w-5 h-5 text-red-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.732-.833-2.5 0L4.314 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                            </svg>
                            <p class="text-red-300 font-medium">Error Details</p>
                        </div>
                        <p id="error-message" class="text-red-400 font-mono text-sm bg-red-900/30 rounded p-2"></p>
                    </div>
                    
                    <!-- Action Buttons -->
                    <div class="space-y-3">
                        <button onclick="goBack()" class="glossy-button w-full py-4 px-6 rounded-xl text-white font-semibold text-lg shadow-lg transform transition-all duration-300 hover:scale-105 hover:shadow-xl flex items-center justify-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                            Try Again
                        </button>
                        
                        <button onclick="goToAuth()" class="w-full py-4 px-6 rounded-xl text-gray-300 font-semibold text-lg border-2 border-gray-600 hover:bg-gray-800 transition-all duration-300 transform hover:scale-105 flex items-center justify-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                            </svg>
                            Back to Login
                        </button>
                    </div>
                    
                    <!-- Help Text -->
                    <p class="text-gray-400 text-sm mt-6">
                        Need help? <a href="auth.html" class="text-blue-400 hover:text-blue-300 underline">Contact Support</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const provider = urlParams.get('provider');
        const error = urlParams.get('error');
        
        document.getElementById('provider-name').textContent = provider ? provider.charAt(0).toUpperCase() + provider.slice(1) : 'OAuth Provider';
        document.getElementById('error-message').textContent = error || 'Unknown error occurred';
        
        function goBack() {
            window.history.back();
        }
        
        function goToAuth() {
            window.location.href = 'auth.html';
        }
    </script>
</body>
</html>
