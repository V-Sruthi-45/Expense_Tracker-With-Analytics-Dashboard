<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Success - Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glossy-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            position: relative;
            overflow: hidden;
        }
        
        .glossy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .glossy-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .glossy-button {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .glossy-button:hover {
            background: linear-gradient(145deg, #334155, #1e293b);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .glossy-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .glossy-button:hover::before {
            left: 100%;
        }
        
        .glossy-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            box-shadow: 
                0 10px 20px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100vw;
            min-width: 100%;
            height: 100px;
            min-height: 100px;
            position: relative;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .animate-shimmer {
            animation: shimmer 2s infinite;
        }
        
        .delay-1000 {
            animation-delay: 1s;
        }
    </style>
</head>
<body class="glossy-bg min-h-screen">
    <!-- Header -->
    <header class="glossy-header shadow-lg border-b border-white/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-240 py-8">
                <div class="flex items-center">
                    <h1 class="text-3xl font-bold text-white flex items-center">
                        <span class="mr-3">💰</span> EXPENSE TRACKER
                    </h1>
                </div>
                <nav class="flex space-x-8">
                    <a href="index.html" class="nav-btn glossy-nav-btn text-white/90 hover:text-white px-4 py-2 text-sm font-medium rounded-lg">Dashboard</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="min-h-screen flex items-center justify-center">
        <div class="relative z-10">
            <!-- Animated Background Elements -->
            <div class="absolute inset-0 overflow-hidden">
                <div class="absolute -top-40 -right-40 w-80 h-80 bg-green-500/20 rounded-full blur-3xl animate-pulse"></div>
                <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-blue-500/20 rounded-full blur-3xl animate-pulse delay-1000"></div>
            </div>
            
            <!-- Success Container -->
            <div class="glossy-card rounded-2xl p-8 max-w-md w-full mx-4 relative overflow-hidden">
                <!-- Shimmer Effect -->
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -skew-x-12 animate-shimmer"></div>
                
                <div class="text-center relative z-10">
                    <!-- Success Icon with Animation -->
                    <div class="mx-auto w-20 h-20 bg-gradient-to-br from-green-500 to-green-600 rounded-full flex items-center justify-center mb-6 shadow-2xl transform transition-all duration-300 hover:scale-110">
                        <svg class="w-10 h-10 text-white animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    
                    <!-- Success Title -->
                    <h1 class="text-3xl font-bold text-white mb-3 bg-gradient-to-r from-green-400 to-green-600 bg-clip-text text-transparent">
                        Authentication Successful!
                    </h1>
                    
                    <!-- Success Description -->
                    <p class="text-gray-300 mb-6 leading-relaxed">
                        You have successfully logged in with <span id="provider-name" class="font-semibold text-white"></span>
                    </p>
                    
                    <!-- User Info Card -->
                    <div class="bg-green-500/10 border border-green-500/30 rounded-xl p-6 mb-6 backdrop-blur-sm">
                        <div class="flex items-center mb-2">
                            <svg class="w-5 h-5 text-green-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <p class="text-green-300 font-medium">User Information</p>
                        </div>
                        <p id="user-email" class="text-white font-mono text-sm bg-green-900/30 rounded p-2 mb-1"></p>
                        <p id="user-name" class="text-gray-300 text-sm"></p>
                    </div>
                    
                    <!-- Action Button -->
                    <button onclick="redirectToDashboard()" class="glossy-button w-full py-4 px-6 rounded-xl text-white font-semibold text-lg shadow-lg transform transition-all duration-300 hover:scale-105 hover:shadow-xl flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        Go to Dashboard
                    </button>
                    
                    <!-- Auto-redirect message -->
                    <p class="text-gray-400 text-sm mt-6 flex items-center justify-center">
                        <svg class="w-4 h-4 mr-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        Redirecting automatically in <span id="countdown" class="font-bold">3</span> seconds...
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const provider = urlParams.get('provider');
        const email = urlParams.get('email');
        const name = urlParams.get('name');
        const error = urlParams.get('error');
        
        if (error) {
            // Handle error case
            document.querySelector('.glossy-card').innerHTML = `
                <div class="text-center">
                    <div class="mx-auto w-16 h-16 bg-red-500 rounded-full flex items-center justify-center mb-6">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold text-white mb-2">Login Failed</h1>
                    <p class="text-gray-300 mb-6">There was an error logging in with ${provider}</p>
                    <p class="text-red-400 text-sm mb-6">${error}</p>
                    <button onclick="goBack()" class="glossy-button w-full py-3 px-6 rounded-xl text-white font-semibold">
                        Try Again
                    </button>
                </div>
            `;
        } else {
            // Handle success case
            document.getElementById('provider-name').textContent = provider.charAt(0).toUpperCase() + provider.slice(1);
            document.getElementById('user-email').textContent = email;
            document.getElementById('user-name').textContent = name;
            
            // Store auth data
            const authData = {
                user: {
                    name: name,
                    email: email,
                    role: 'user',
                    provider: provider
                },
                token: `${provider}-oauth-token-${Date.now()}`,
                timestamp: new Date().toISOString(),
            };

            localStorage.setItem("expense_tracker_auth", JSON.stringify(authData));
            
            // Auto-redirect countdown
            let countdown = 3;
            const countdownElement = document.getElementById('countdown');
            
            const countdownInterval = setInterval(() => {
                countdown--;
                countdownElement.textContent = countdown;
                
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    redirectToDashboard();
                }
            }, 1000);
        }
        
        function redirectToDashboard() {
            window.location.href = 'index.html';
        }
        
        function goBack() {
            window.location.href = 'auth.html';
        }
    </script>
</body>
</html>
