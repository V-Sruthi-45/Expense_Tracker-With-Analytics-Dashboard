<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Success - Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glossy-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            position: relative;
            overflow: hidden;
        }
        
        .glossy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .glossy-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .glossy-button {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .glossy-button:hover {
            background: linear-gradient(145deg, #334155, #1e293b);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .glossy-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .glossy-button:hover::before {
            left: 100%;
        }
    </style>
</head>
<body class="glossy-bg min-h-screen flex items-center justify-center">
    <div class="relative z-10">
        <div class="glossy-card rounded-2xl p-8 max-w-md w-full mx-4">
            <div class="text-center">
                <!-- Success Icon -->
                <div class="mx-auto w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mb-6">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                
                <h1 class="text-2xl font-bold text-white mb-2">Login Successful!</h1>
                <p class="text-gray-300 mb-6">You have successfully logged in with <span id="provider-name" class="font-semibold"></span></p>
                
                <!-- User Info -->
                <div class="bg-white/10 rounded-lg p-4 mb-6">
                    <p class="text-sm text-gray-300">Welcome back!</p>
                    <p id="user-email" class="text-white font-semibold"></p>
                    <p id="user-name" class="text-gray-300 text-sm"></p>
                </div>
                
                <!-- Redirect Button -->
                <button onclick="redirectToDashboard()" class="glossy-button w-full py-3 px-6 rounded-xl text-white font-semibold">
                    Go to Dashboard
                </button>
                
                <!-- Auto-redirect message -->
                <p class="text-gray-400 text-sm mt-4">
                    Redirecting automatically in <span id="countdown">3</span> seconds...
                </p>
            </div>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const provider = urlParams.get('provider');
        const email = urlParams.get('email');
        const name = urlParams.get('name');
        const error = urlParams.get('error');
        
        if (error) {
            // Handle error case
            document.querySelector('.glossy-card').innerHTML = `
                <div class="text-center">
                    <div class="mx-auto w-16 h-16 bg-red-500 rounded-full flex items-center justify-center mb-6">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold text-white mb-2">Login Failed</h1>
                    <p class="text-gray-300 mb-6">There was an error logging in with ${provider}</p>
                    <p class="text-red-400 text-sm mb-6">${error}</p>
                    <button onclick="goBack()" class="glossy-button w-full py-3 px-6 rounded-xl text-white font-semibold">
                        Try Again
                    </button>
                </div>
            `;
        } else {
            // Handle success case
            document.getElementById('provider-name').textContent = provider.charAt(0).toUpperCase() + provider.slice(1);
            document.getElementById('user-email').textContent = email;
            document.getElementById('user-name').textContent = name;
            
            // Store auth data
            const authData = {
                user: {
                    name: name,
                    email: email,
                    role: 'user',
                    provider: provider
                },
                token: `${provider}-oauth-token-${Date.now()}`,
                timestamp: new Date().toISOString(),
            };

            localStorage.setItem("expense_tracker_auth", JSON.stringify(authData));
            
            // Auto-redirect countdown
            let countdown = 3;
            const countdownElement = document.getElementById('countdown');
            
            const countdownInterval = setInterval(() => {
                countdown--;
                countdownElement.textContent = countdown;
                
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    redirectToDashboard();
                }
            }, 1000);
        }
        
        function redirectToDashboard() {
            window.location.href = 'index.html';
        }
        
        function goBack() {
            window.location.href = 'auth.html';
        }
    </script>
</body>
</html>
